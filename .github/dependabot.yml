version: 2
updates:
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nix"
    directory: "/internal"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nix"
    directory: "/plugins"
    schedule:
      interval: "daily"
